<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails demande')}"></head>
<body>
<div class="container mt-4">
    <a class="btn btn-link" th:href="@{/demandes}">← Retour liste</a>
    <h1>Détails demande #[[${demande.id}]]</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <dl class="row">
        <dt class="col-sm-3">Demandeur</dt>
        <dd class="col-sm-9" th:text="${demande.demandeur.nom} + ' ' + ${demande.demandeur.prenom}"></dd>

        <dt class="col-sm-3">Date</dt>
        <dd class="col-sm-9" th:text="${demande.dateDemande}"></dd>

        <dt class="col-sm-3">Statut courant</dt>
        <dd class="col-sm-9" th:text="${statut}"></dd>
    </dl>


    <div th:if="${statut} == 'CREE'">
        <div class="mb-3">
            <a th:href="@{/demandes/{id}/pieces/upload(id=${demande.id})}" class="btn btn-success">UPLOAD FICHIER</a>
        </div>
        <form th:action="@{/demandes/{id}/scan-termine(id=${demande.id})}" method="post">
            <button type="submit" class="btn btn-primary">SCAN_TERMINE</button>
        </form>
    </div>

    <!-- QR code button + modal -->
    <div class="mt-3">
        <button id="btn-qrcode" class="btn btn-secondary" data-id="[[${demande.id}]]">Obtenir QR code</button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="qrcodeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR code</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="qrcode-img" alt="QR code" style="max-width:100%; height:auto;" />
                    <p class="mt-2">Lien vers la page React :</p>
                    <a id="qrcode-link" href="#" target="_blank"></a>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const btn = document.getElementById('btn-qrcode');
            if (!btn) return;
            btn.addEventListener('click', function() {
                const id = btn.dataset.id || '';
                const ip = '192.168.1.20'; // TODO: utiliser ReactConstants côté serveur si besoin
                const port = 5173;
                const endpoint = '/demandes/details';
                const link = 'http://' + ip + ':' + port + endpoint + '?id=' + encodeURIComponent(id);

                // Utilise l'API Google Chart pour générer une image QR côté client.
                // Remarque: le sprint demandait l'ajout de ZXing côté back-end. L'intégration serveur
                // (ex: endpoint /demandes/{id}/qrcode qui appelerait QRCodeGenerator) n'est pas implémentée
                // ici pour rester strictement sur les tâches demandées. Voir TODO dans le controller.
                const qrSrc = 'https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=' + encodeURIComponent(link);

                document.getElementById('qrcode-img').src = qrSrc;
                const linkEl = document.getElementById('qrcode-link');
                linkEl.href = link;
                linkEl.textContent = link;

                // Show bootstrap modal
                try {
                    const modal = new bootstrap.Modal(document.getElementById('qrcodeModal'));
                    modal.show();
                } catch (e) {
                    // if bootstrap not available, fallback to alert with link
                    alert('QR disponible: ' + link);
                }
            });
        })();
    </script>

</div>
</body>
</html>
