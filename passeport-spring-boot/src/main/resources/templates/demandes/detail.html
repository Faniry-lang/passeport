<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Détails demande')}"></head>
<body>
<div class="container mt-4">
    <a class="btn btn-link" th:href="@{/demandes}">← Retour liste</a>
    <h1>Détails demande #[[${demande.id}]]</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <dl class="row">
        <dt class="col-sm-3">Demandeur</dt>
        <dd class="col-sm-9" th:text="${demande.demandeur.nom} + ' ' + ${demande.demandeur.prenom}"></dd>

        <dt class="col-sm-3">Date</dt>
        <dd class="col-sm-9" th:text="${demande.dateDemande}"></dd>

        <dt class="col-sm-3">Statut courant</dt>
        <dd class="col-sm-9" th:text="${statut}"></dd>
    </dl>


    <div th:if="${statut} == 'CREE'">
        <div class="mb-3">
            <a th:href="@{/demandes/{id}/pieces/upload(id=${demande.id})}" class="btn btn-success">UPLOAD FICHIER</a>
        </div>
        <form th:action="@{/demandes/{id}/scan-termine(id=${demande.id})}" method="post">
            <button type="submit" class="btn btn-primary">SCAN_TERMINE</button>
        </form>
    </div>

    <!-- QR code button + modal -->
    <div class="mt-3">
        <button type="button" id="btn-qrcode" class="btn btn-secondary">Obtenir QR code</button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="qrcodeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">QR code</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="qrcode-img" alt="QR code" style="max-width:100%; height:auto;" />
                    <p class="mt-2">Lien vers la page React :</p>
                    <a id="qrcode-link" href="#" target="_blank"></a>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                </div>
            </div>
        </div>
    </div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('btn-qrcode');
        if (!btn) return;

        const demandeId = /*[[${demande.id}]]*/ 0;
        const reactIp = /*[[${reactIp}]]*/ '192.168.1.20';
        const reactPort = /*[[${reactPort}]]*/ 5173;
        const reactEndpoint = /*[[${reactEndpoint}]]*/ '/demandes/details';
        const reactLink = 'http://' + reactIp + ':' + reactPort + reactEndpoint + '?id=' + demandeId;
        const qrcodeEndpoint = /*[[@{/demandes/{id}/qrcode(id=${demande.id})}]]*/ '';

        btn.addEventListener('click', function() {
            const qrImage = document.getElementById('qrcode-img');
            const linkEl = document.getElementById('qrcode-link');
            qrImage.src = qrcodeEndpoint + '?t=' + Date.now();
            qrImage.alt = 'QR code de la demande #' + demandeId;
            linkEl.href = reactLink;
            linkEl.textContent = reactLink;

            // Guard in case Bootstrap isn't loaded
            if (!window.bootstrap) {
                console.error('Bootstrap JS not loaded');
                return;
            }

            const modal = new window.bootstrap.Modal(document.getElementById('qrcodeModal'));
            modal.show();
        });
    });
</script>

</div>
</body>
</html>
