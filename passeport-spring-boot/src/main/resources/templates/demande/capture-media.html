<!-- Fragment modal pour capture photo et signature -->
<div th:fragment="captureModal">
    <div class="modal fade" id="captureMediaModal" tabindex="-1" aria-labelledby="captureMediaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="captureMediaModalLabel">Capturer Photo et Signature</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6>Caméra</h6>
                            <div class="border p-2 mb-2">
                                <video id="cameraPreview" autoplay playsinline class="w-100" style="background:#000; min-height:200px;"></video>
                                <canvas id="photoCanvas" style="display:none; width:100%;"></canvas>
                            </div>
                            <div class="d-flex gap-2">
                                <button id="startCameraBtn" type="button" class="btn btn-sm btn-outline-primary">Activer la caméra</button>
                                <button id="takePhotoBtn" type="button" class="btn btn-sm btn-primary">Prendre la photo</button>
                                <button id="retakePhotoBtn" type="button" class="btn btn-sm btn-outline-secondary" style="display:none;">Reprendre</button>
                                <span id="cameraStatus" class="text-danger small ms-2"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>Signature</h6>
                            <div class="border p-2 mb-2">
                                <canvas id="signaturePad" class="w-100" style="height:200px;"></canvas>
                            </div>
                            <div class="d-flex gap-2">
                                <button id="clearSignatureBtn" type="button" class="btn btn-sm btn-outline-secondary">Effacer</button>
                                <span class="text-muted small">Dessinez votre signature avec la souris ou le doigt.</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <p class="small text-muted">Après enregistrement, la photo et la signature seront ajoutées au formulaire. Le backend gèrera l'obligation des pièces.</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveCaptureBtn" type="button" class="btn btn-primary">Enregistrer et fermer</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                </div>
            </div>
        </div>
    </div>
</div>
